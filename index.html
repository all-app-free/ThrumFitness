<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thrum Fitness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.7);
            --neon-green: #2ecc71;
            --thrum-red: #e74c3c;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(85px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.98);
            border-top: 1px solid var(--glass);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 15px;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            height: 50px;
            transition: 0.3s;
            pointer-events: auto;
        }

        .nav-item i { font-size: 1.6rem; color: #444; transition: 0.3s; }
        .nav-item.active i { color: var(--neon-green); filter: drop-shadow(0 0 8px var(--neon-green)); }
        .nav-label { font-size: 0.6rem; margin-top: 4px; color: #444; text-transform: uppercase; }
        .nav-item.active .nav-label { color: var(--neon-green); }

        /* --- MAIN LAYOUT --- */
        header { padding: 40px 25px 10px; display: flex; justify-content: space-between; align-items: center; }
        
        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px calc(110px + env(safe-area-inset-bottom)) 20px;
        }

        .page { display: none; animation: fadeIn 0.4s ease forwards; }
        .page.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- UI COMPONENTS --- */
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid var(--glass); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 15px; 
            backdrop-filter: blur(10px);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-val { font-size: 2.2rem; font-weight: 900; color: var(--neon-green); display: block; line-height: 1; margin: 5px 0; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1.2px; font-weight: bold; }
        
        .btn { 
            background: var(--glass); 
            border: 1px solid var(--neon-green); 
            color: white; padding: 14px; 
            border-radius: 14px; width: 100%; 
            font-weight: bold; cursor: pointer; 
            transition: 0.2s; outline: none;
        }
        .btn:active { background: var(--neon-green); color: black; transform: scale(0.96); }
        .btn-red { border-color: var(--thrum-red); }
        .btn-red:active { background: var(--thrum-red); color: white; }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass);
            border-radius: 12px;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        .lvl-badge { background: var(--thrum-red); padding: 5px 14px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3); }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Flash effect */
        #flash { position: fixed; inset: 0; background: white; z-index: 3000; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="splash">
        <h1 style="color: var(--thrum-red); font-size: 3.5rem; margin: 0; letter-spacing: -2px;">THRUM</h1>
        <p style="opacity: 0.4; letter-spacing: 5px; font-size: 0.7rem; margin-top: -5px;">LUVYX EDITION</p>
        <button class="btn" onclick="initApp()" style="width: 220px; margin-top: 40px; border-radius: 30px;">VSTOUPIT DO ZÓNY</button>
    </div>

    <header>
        <div>
            <span class="stat-label">Vítejte v zóně</span>
            <div style="font-size: 1.4rem; font-weight: 800;">User_Alpha</div>
        </div>
        <div class="lvl-badge">LVL <span id="lvl-num">1</span></div>
    </header>

    <main>
        <div id="home" class="page active">
            <div class="grid">
                <div class="glass-card">
                    <span class="stat-label">Kroky</span>
                    <span id="step-count" class="stat-val">0</span>
                </div>
                <div class="glass-card">
                    <span class="stat-label">Kalorie</span>
                    <span id="cal-count" class="stat-val">0</span>
                </div>
            </div>

            <div class="glass-card" style="border-left: 5px solid var(--thrum-red);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <i class="fas fa-robot" style="color: var(--thrum-red);"></i>
                    <span style="font-weight: bold; text-transform: uppercase; font-size: 0.8rem;">Thrum AI Coach</span>
                </div>
                <p id="ai-text" style="margin: 0 0 15px 0; font-size: 1rem; line-height: 1.4; min-height: 45px;">Dnes je skvělý den na překonávání rekordů!</p>
                <button class="btn" onclick="generateChallenge()" style="padding: 10px; font-size: 0.8rem;">GENEROVAT VÝZVU</button>
            </div>

            <div class="glass-card" style="text-align: center;">
                <span class="stat-label">HIIT Časovač</span>
                <div id="timer-display" style="font-size: 4rem; font-weight: 900; margin: 10px 0; font-variant-numeric: tabular-nums;">00:00</div>
                <div class="grid">
                    <button class="btn" id="timer-btn" onclick="toggleTimer()">START</button>
                    <button class="btn btn-red" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>

        <div id="stats" class="page">
            <h2 style="margin-left: 5px;">Statistiky</h2>
            <div class="glass-card">
                <span class="stat-label">Luvyx XP</span>
                <span id="xp-stat" class="stat-val">0 XP</span>
                <div style="height: 6px; background: #222; border-radius: 3px; margin-top: 10px;">
                    <div id="xp-bar" style="width: 0%; height: 100%; background: var(--neon-green); border-radius: 3px; transition: 0.5s;"></div>
                </div>
            </div>
            <div class="glass-card">
                <span class="stat-label">Dnešní hydratace</span>
                <span id="water-stat" class="stat-val">0 ml</span>
            </div>
            <button class="btn btn-red" onclick="exportData()" style="margin-top: 10px;">
                <i class="fas fa-file-download"></i> STÁHNOUT REPORT
            </button>
        </div>

        <div id="activity" class="page">
            <h2 style="margin-left: 5px;">Hydratace</h2>
            <div class="glass-card" style="text-align: center;">
                <span class="stat-label">Celkem vypito</span>
                <div style="font-size: 3rem; margin: 15px 0; font-weight: 900; color: #3498db;">
                    <span id="water-count">0</span><span style="font-size: 1.2rem; margin-left: 5px;">ml</span>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="number" id="water-input" placeholder="Zadej ml..." inputmode="numeric">
                    <button class="btn" onclick="addCustomWater()" style="flex: 0.6;">PŘIDAT</button>
                </div>
                
                <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <button class="btn" style="padding: 8px; font-size: 0.7rem; border-color: #333;" onclick="quickWater(250)">+250ml</button>
                    <button class="btn" style="padding: 8px; font-size: 0.7rem; border-color: #333;" onclick="quickWater(500)">+500ml</button>
                    <button class="btn" style="padding: 8px; font-size: 0.7rem; border-color: #333;" onclick="quickWater(750)">+750ml</button>
                </div>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchPage('home', this)">
            <i class="fas fa-home"></i>
            <span class="nav-label">Domů</span>
        </div>
        <div class="nav-item" onclick="switchPage('stats', this)">
            <i class="fas fa-chart-bar"></i>
            <span class="nav-label">Stats</span>
        </div>
        <div class="nav-item" onclick="switchPage('activity', this)">
            <i class="fas fa-tint"></i>
            <span class="nav-label">Voda</span>
        </div>
        <div class="nav-item" onclick="haptic(50); alert('Nastavení v další aktualizaci!')">
            <i class="fas fa-cog"></i>
            <span class="nav-label">Nastavení</span>
        </div>
    </nav>

    <script>
        // --- DATA STATE ---
        let state = {
            steps: parseInt(localStorage.getItem('thrum_steps')) || 0,
            water: parseInt(localStorage.getItem('thrum_water')) || 0,
            xp: parseInt(localStorage.getItem('thrum_xp')) || 0,
            lvl: 1
        };

        // --- APP INIT ---
        function initApp() {
            document.getElementById('splash').style.display = 'none';
            haptic(100);
            updateUI();
            
            // Pedometer activation
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().catch(() => {});
            }
            window.addEventListener('devicemotion', handleMotion);
            
            // Audio Context Unlock
            const silent = new AudioContext();
            silent.resume();
        }

        // --- NAVIGATION ---
        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            haptic(20);
        }

        // --- MOTION LOGIC ---
        let lastMove = 0;
        function handleMotion(e) {
            let acc = e.accelerationIncludingGravity;
            if(!acc.x) return;
            let force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            if (force > 13 && (Date.now() - lastMove > 350)) {
                state.steps++;
                state.xp += 2;
                lastMove = Date.now();
                updateUI();
                saveData();
                if (state.steps % 50 === 0) celebration();
            }
        }

        // --- WATER LOGIC ---
        function addCustomWater() {
            const val = parseInt(document.getElementById('water-input').value);
            if(val > 0) {
                quickWater(val);
                document.getElementById('water-input').value = '';
            }
        }

        function quickWater(amt) {
            state.water += amt;
            state.xp += Math.floor(amt / 10);
            updateUI();
            saveData();
            haptic([30, 50, 30]);
            if(amt >= 500) celebration();
        }

        // --- TIMER LOGIC ---
        let timerInt; let seconds = 0;
        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (!timerInt) {
                timerInt = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds/60).toString().padStart(2,'0');
                    let s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('timer-display').innerText = `${m}:${s}`;
                }, 1000);
                btn.innerText = "PAUZA";
                haptic(40);
            } else {
                clearInterval(timerInt); timerInt = null;
                btn.innerText = "START";
            }
        }

        function resetTimer() {
            clearInterval(timerInt); timerInt = null; seconds = 0;
            document.getElementById('timer-display').innerText = "00:00";
            document.getElementById('timer-btn').innerText = "START";
            haptic(100);
        }

        // --- AI COACH ---
        function generateChallenge() {
            const challenges = [
                "Dej 15 dřepů a napij se!",
                "Drž plank 45 vteřin. Teď!",
                "Udělej 10 kliků pro extra XP.",
                "Běhej 1 minutu na místě.",
                "Vypij 300ml čisté vody."
            ];
            const pick = challenges[Math.floor(Math.random()*challenges.length)];
            document.getElementById('ai-text').innerText = pick;
            haptic(60);
            
            const speech = new SpeechSynthesisUtterance(pick);
            speech.lang = 'cs-CZ';
            window.speechSynthesis.speak(speech);
        }

        // --- UTILS ---
        function updateUI() {
            document.getElementById('step-count').innerText = state.steps;
            document.getElementById('cal-count').innerText = Math.floor(state.steps * 0.04);
            document.getElementById('water-count').innerText = state.water;
            document.getElementById('water-stat').innerText = state.water + " ml";
            document.getElementById('xp-stat').innerText = state.xp + " XP";
            
            // Level logic
            state.lvl = Math.floor(state.xp / 500) + 1;
            document.getElementById('lvl-num').innerText = state.lvl;
            document.getElementById('xp-bar').style.width = ((state.xp % 500) / 5) + "%";
        }

        function saveData() {
            localStorage.setItem('thrum_steps', state.steps);
            localStorage.setItem('thrum_water', state.water);
            localStorage.setItem('thrum_xp', state.xp);
        }

        function haptic(pattern) {
            if(navigator.vibrate) navigator.vibrate(pattern);
        }

        function celebration() {
            const f = document.getElementById('flash');
            f.style.display = 'block';
            setTimeout(() => f.style.display = 'none', 150);
            haptic([100, 50, 100, 50, 100]);
        }

        function exportData() {
            const data = `THRUM LUVYX REPORT\nSteps: ${state.steps}\nWater: ${state.water}ml\nXP: ${state.xp}\nLevel: ${state.lvl}`;
            const blob = new Blob([data], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'thrum_fitness.txt';
            a.click();
        }
    </script>
</body>
</html>
