<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thrum Fitness Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #070707;
            --card-bg: rgba(20, 20, 20, 0.85);
            --neon-green: #2ecc71;
            --thrum-red: #e74c3c;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent-blue: #3498db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; bottom: 0; width: 100%; 
            height: calc(85px + env(safe-area-inset-bottom)); 
            background: rgba(7, 7, 7, 0.98); border-top: 1px solid var(--glass); 
            display: flex; justify-content: space-around; padding-top: 15px; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--neon-green); }
        .nav-item i { font-size: 1.5rem; }
        .nav-label { font-size: 0.65rem; margin-top: 6px; font-weight: 600; text-transform: uppercase; }

        /* --- PAGES --- */
        main { flex: 1; overflow-y: auto; padding: 20px 20px 120px 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { padding: 50px 25px 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .lvl-badge { background: var(--thrum-red); padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 900; }

        .glass-card { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 28px; padding: 22px; margin-bottom: 16px; backdrop-filter: blur(20px); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1.5px; font-weight: 700; display: block; }
        .stat-val { font-size: 2.8rem; font-weight: 900; color: var(--neon-green); display: block; }
        
        .btn { background: var(--glass); border: 2px solid var(--neon-green); color: white; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.95); background: var(--neon-green); color: black; }
        .btn-red { border-color: var(--thrum-red); }

        input { background: #151515; border: 1px solid #333; color: white; padding: 14px; border-radius: 14px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 4rem; color: var(--thrum-red); margin: 0; letter-spacing: -2px;">THRUM</h1>
        <p style="letter-spacing: 8px; opacity: 0.3; font-size: 0.8rem; margin-top: -5px;">LUVYX EDITION</p>
        <div style="width: 80%; max-width: 300px; margin-top: 50px;">
            <button class="btn" id="start-btn" onclick="initApp()">VSTOUPIT</button>
        </div>
    </div>

    <header>
        <div>
            <span id="greeting" class="stat-label">Vítejte</span>
            <div id="display-name" style="font-size: 1.8rem; font-weight: 900;">User_Alpha</div>
        </div>
        <div class="lvl-badge">LVL <span id="lvl-num">1</span></div>
    </header>

    <main>
        <div id="home" class="page active">
            <div class="glass-card" style="text-align: center; border-bottom: 4px solid var(--neon-green);">
                <span class="stat-label">Kroky Dnes</span>
                <span id="step-count" class="stat-val">0</span>
                <div style="font-size: 0.85rem; opacity: 0.6;"><i class="fas fa-fire"></i> <span id="cal-count">0</span> kcal</div>
            </div>

            <div class="glass-card" style="border-left: 5px solid var(--thrum-red);">
                <span class="stat-label">Thrum AI Coach</span>
                <p id="ai-text" style="font-weight: 500; margin: 15px 0;">Jsi připraven na trénink?</p>
                <button class="btn" onclick="generateChallenge()" style="padding:10px; font-size:0.75rem;">NOVÁ VÝZVA</button>
            </div>

            <div class="glass-card">
                <span class="stat-label">HIIT Časovač</span>
                <div id="timer-display" style="font-size:3.5rem; font-weight:900; text-align:center; margin:10px 0;">00:00.0</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" id="timer-btn" onclick="toggleTimer()">START</button>
                    <button class="btn btn-red" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>

        <div id="stats" class="page">
            <h2 style="font-weight:900;">Statistiky</h2>
            <div class="glass-card">
                <span class="stat-label">Luvyx XP</span>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span id="xp-current">0 XP</span>
                    <span id="xp-next">1000 XP</span>
                </div>
                <div style="height:10px; background:#111; border-radius:10px; overflow:hidden;">
                    <div id="xp-bar" style="width:0%; height:100%; background:var(--neon-green);"></div>
                </div>
            </div>
            <div class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="glass-card">
                    <span class="stat-label">BMI</span>
                    <span id="bmi-val" class="stat-val" style="font-size:1.8rem;">--</span>
                </div>
                <div class="glass-card">
                    <span class="stat-label">Voda</span>
                    <span id="water-stat" class="stat-val" style="font-size:1.8rem;">0L</span>
                </div>
            </div>
            <button class="btn" onclick="exportData()" style="border-color:#555;">STÁHNOUT REPORT</button>
        </div>

        <div id="water" class="page">
            <h2 style="font-weight:900;">Hydratace</h2>
            <div class="glass-card" style="text-align:center;">
                <div id="water-visual" style="width:150px; height:150px; border-radius:50%; border:5px solid #3498db; margin:20px auto; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;">
                    <div id="water-fill" style="position:absolute; bottom:0; width:100%; background:rgba(52,152,219,0.4); height:0%; transition:1s;"></div>
                    <span id="water-display" style="font-size:2.5rem; font-weight:900; z-index:2;">0</span>
                </div>
                <input type="number" id="water-input" placeholder="Množství v ml" inputmode="numeric">
                <button class="btn" onclick="addWater('custom')" style="margin-top:10px; border-color:var(--accent-blue);">PŘIDAT</button>
            </div>
        </div>

        <div id="config" class="page">
            <h2 style="font-weight:900;">Nastavení</h2>
            <div class="glass-card">
                <span class="stat-label">Profil</span>
                <input type="text" id="cfg-name" placeholder="Přezdívka" onchange="saveAll()">
                <input type="number" id="cfg-height" placeholder="Výška (cm)" onchange="saveAll()">
                <input type="number" id="cfg-weight" placeholder="Váha (kg)" onchange="saveAll()">
            </div>
            <button class="btn btn-red" onclick="localStorage.clear(); location.reload();">SMAZAT DATA</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="nav('home', this)"><i class="fas fa-home"></i><span class="nav-label">Domů</span></div>
        <div class="nav-item" onclick="nav('stats', this)"><i class="fas fa-chart-bar"></i><span class="nav-label">Stats</span></div>
        <div class="nav-item" onclick="nav('water', this)"><i class="fas fa-tint"></i><span class="nav-label">Voda</span></div>
        <div class="nav-item" onclick="nav('config', this)"><i class="fas fa-cog"></i><span class="nav-label">Nastav.</span></div>
    </nav>

    <script>
        let app = {
            steps: parseInt(localStorage.getItem('th_steps')) || 0,
            water: parseInt(localStorage.getItem('th_water')) || 0,
            xp: parseInt(localStorage.getItem('th_xp')) || 0,
            name: localStorage.getItem('th_name') || 'User_Alpha',
            height: localStorage.getItem('th_h') || 0,
            weight: localStorage.getItem('th_w') || 0
        };

        function initApp() {
            // Skrytí splash screenu
            document.getElementById('splash').style.display = 'none';
            
            // Aktivace audio kontextu (pro řeč)
            if (window.speechSynthesis) {
                const welcome = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(welcome);
            }

            // Povolení senzorů na iOS
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    });
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            loadSettings();
            updateUI();
            haptic(50);
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            haptic(10);
        }

        function handleMotion(e) {
            let a = e.accelerationIncludingGravity;
            if(!a || !a.x) return;
            let force = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            if(force > 13.5) {
                app.steps++;
                app.xp += 1;
                if(app.steps % 5 === 0) { updateUI(); saveAll(); }
            }
        }

        function addWater(amt) {
            let val = amt === 'custom' ? parseInt(document.getElementById('water-input').value) : amt;
            if(val > 0) {
                app.water += val;
                app.xp += Math.floor(val/10);
                updateUI(); saveAll();
                document.getElementById('water-input').value = '';
                haptic([30, 50, 30]);
            }
        }

        let tInt; let time = 0;
        function toggleTimer() {
            const b = document.getElementById('timer-btn');
            if(!tInt) {
                tInt = setInterval(() => {
                    time += 100;
                    let s = Math.floor(time/1000);
                    let m = Math.floor(s/60);
                    let d = (time%1000)/100;
                    document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}.${d}`;
                }, 100);
                b.innerText = 'PAUZA';
            } else {
                clearInterval(tInt); tInt = null;
                b.innerText = 'START';
            }
        }

        function resetTimer() {
            clearInterval(tInt); tInt = null; time = 0;
            document.getElementById('timer-display').innerText = "00:00.0";
            document.getElementById('timer-btn').innerText = 'START';
        }

        function generateChallenge() {
            const ch = ["Udělej 15 dřepů!", "Drž plank 45 vteřin", "Vypij 250ml vody", "Udělej 10 kliků"];
            const p = ch[Math.floor(Math.random()*ch.length)];
            document.getElementById('ai-text').innerText = p;
            haptic(60);
            const s = new SpeechSynthesisUtterance(p);
            s.lang = 'cs-CZ';
            window.speechSynthesis.speak(s);
        }

        function updateUI() {
            document.getElementById('display-name').innerText = app.name;
            document.getElementById('step-count').innerText = app.steps;
            document.getElementById('cal-count').innerText = Math.floor(app.steps * 0.04);
            document.getElementById('water-display').innerText = app.water;
            document.getElementById('water-stat').innerText = (app.water/1000).toFixed(1) + "L";
            document.getElementById('water-fill').style.height = Math.min(100, (app.water/3000)*100) + "%";
            
            let lvl = Math.floor(app.xp / 1000) + 1;
            let cxp = app.xp % 1000;
            document.getElementById('lvl-num').innerText = lvl;
            document.getElementById('xp-current').innerText = cxp + " XP";
            document.getElementById('xp-bar').style.width = (cxp/10) + "%";

            if(app.height > 0 && app.weight > 0) {
                let bmi = (app.weight / ((app.height/100)**2)).toFixed(1);
                document.getElementById('bmi-val').innerText = bmi;
            }
        }

        function saveAll() {
            app.name = document.getElementById('cfg-name').value || 'User_Alpha';
            app.height = document.getElementById('cfg-height').value;
            app.weight = document.getElementById('cfg-weight').value;
            localStorage.setItem('th_steps', app.steps);
            localStorage.setItem('th_water', app.water);
            localStorage.setItem('th_xp', app.xp);
            localStorage.setItem('th_name', app.name);
            localStorage.setItem('th_h', app.height);
            localStorage.setItem('th_w', app.weight);
            updateUI();
        }

        function loadSettings() {
            document.getElementById('cfg-name').value = app.name;
            document.getElementById('cfg-height').value = app.height;
            document.getElementById('cfg-weight').value = app.weight;
        }

        function haptic(p) { if(navigator.vibrate) navigator.vibrate(p); }

        function exportData() {
            const data = `REPORT: ${app.name}\nKroky: ${app.steps}\nVoda: ${app.water}ml\nXP: ${app.xp}`;
            const blob = new Blob([data], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'thrum_report.txt';
            a.click();
        }
    </script>
</body>
</html>
